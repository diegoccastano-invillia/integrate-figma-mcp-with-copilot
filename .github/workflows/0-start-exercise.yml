name: Step 0 - Start Exercise

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  start_exercise:
    name: Start Exercise
    uses: skills/exercise-toolkit/.github/workflows/start-exercise.yml@v0.9.1
    with:
      exercise-title: "Figma MCP + GitHub Copilot: Construa uma Landing Page"
      exercise-description: "Aprenda a usar o Figma MCP com GitHub Copilot para transformar designs em código React."
      exercise-url: ${{ github.server_url }}/${{ github.repository }}
