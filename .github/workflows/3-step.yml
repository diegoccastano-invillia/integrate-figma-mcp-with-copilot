name: Step 3 - Construir Landing Page

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  find_exercise:
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.9.1

  check_components:
    name: Check React components
    needs: [find_exercise]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Check Header.tsx exists
        uses: skills/exercise-toolkit/actions/file-exists@v0.9.1
        with:
          file: src/components/Header.tsx

      - name: Check Hero.tsx exists
        uses: skills/exercise-toolkit/actions/file-exists@v0.9.1
        with:
          file: src/components/Hero.tsx

  post_next_step:
    name: Post Step 4 Instructions
    needs: [find_exercise, check_components]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Post comment
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ needs.find_exercise.outputs.issue-number }}
          file: .github/steps/4-step.md

  finish:
    name: Enable Next Step
    needs: [find_exercise, post_next_step]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Disable current workflow
        run: gh workflow disable "Step 3 - Construir Landing Page" --repo "${{ github.repository }}"
      - name: Enable next workflow
        run: gh workflow enable "Step 4 - Revisar e Publicar" --repo "${{ github.repository }}"
